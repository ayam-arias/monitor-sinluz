name: Actualizar datos SEC

on:
  schedule:
    - cron: "12 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Consultar API SEC
        run: python scripts/actualizar_datos.py

      - name: Commit y push
        run: |
          git config user.name "monitor-bot"
          git config user.email "actions@github.com"
          git add data/
          if ! git diff --cached --quiet; then
            git commit -m "datos: actualizacion automatica"
            git pull --rebase origin main
            git push
          fi
